付　録(作品集)
<hr>

　本研究の作画実験によって描かれた作品は数多く,本文にすべて示すことができなかった.ここでは,愛知県立芸術大学野崎悠子教授,サンライト(株)酒井清春氏の作品を示す.<p>

野崎氏の作品(1から8)は,豊富な濃淡付け機能の効果を評価するために描いたものである.酒井氏の作品(9から16)は,コンクールへの応募やカタログの表紙などに利用されたものである.<p>
